<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script type="module" src="./test.js"></script>

</head>
<body>

    <button id="test-btn">Show</button><input type="number" id="count-input" value="0" min="0" />
    <test-component id="test"></test-component>
</body>
<script type="module">
    import { Enso } from "ensojs";
    document.addEventListener('DOMContentLoaded', async () => {
        await Enso.enableDiagnostics(true);

        const btn = document.getElementById('test-btn');
        const countInput = document.getElementById('count-input');
        const testComp = document.getElementById('test');
        const testNest = document.getElementById('test-nest');

        btn.addEventListener('click', () => {
            testComp.watched.show = !testComp.watched.show;
        });
        testComp.count = parseInt(countInput.value);
        countInput.addEventListener('input', () => {
            const val = parseInt(countInput.value);
            testComp.watched.count = isNaN(val) ? 0 : val;
        });
    });
</script>
</html>
